<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — CampusConnect</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="splash.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="splash.js"></script>
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      background: radial-gradient(circle at top left, rgba(139, 92, 246, 0.1), transparent),
                  radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.1), transparent);
    }
    .back-home {
      position: absolute;
      top: 2rem;
      left: 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
      transition: color 0.3s;
      z-index: 10;
    }
    .back-home:hover { color: #fff; }
    
    .auth-header { margin-bottom: 2.5rem; text-align: center; }
    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .password-wrapper input {
      width: 100%;
      padding-right: 3rem;
    }
    .toggle-password {
      position: absolute;
      right: 1rem;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 1.1rem;
      user-select: none;
      transition: color 0.2s;
    }
    .toggle-password:hover {
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-home">← Back to Site</a>

  <div class="auth-page">
    <div class="form-box" style="max-width: 500px;">
      <div style="display:flex; justify-content:center; margin-bottom:1.5rem;">
        <div class="site-logo">C</div>
      </div>
      <div class="auth-header">
        <h2 class="text-gradient">Welcome Back</h2>
        <p>Choose your login type to continue</p>
      </div>
      
      <div style="display: grid; gap: 1rem; margin-bottom: 1.5rem;">
        <a href="admin-login.html" style="text-decoration: none;">
          <div style="background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(14, 165, 233, 0.1)); border: 2px solid rgba(139, 92, 246, 0.3); border-radius: 12px; padding: 1.5rem; text-align: center; transition: all 0.3s; cursor: pointer;">
            <div style="font-size: 2rem; margin-bottom: 0.5rem;">👨‍💼</div>
            <h3 style="color: #8b5cf6; margin-bottom: 0.3rem;">Admin Login</h3>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">For administrators to manage jobs and applications</p>
          </div>
        </a>
        
        <a href="user-login.html" style="text-decoration: none;">
          <div style="background: linear-gradient(135deg, rgba(34, 197, 94, 0.1), rgba(16, 185, 129, 0.1)); border: 2px solid rgba(34, 197, 94, 0.3); border-radius: 12px; padding: 1.5rem; text-align: center; transition: all 0.3s; cursor: pointer;">
            <div style="font-size: 2rem; margin-bottom: 0.5rem;">🎓</div>
            <h3 style="color: #22c55e; margin-bottom: 0.3rem;">Student Login</h3>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">For students to apply for jobs and track applications</p>
          </div>
        </a>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Register as Student</a>
      </div>
    </div>
  </div>

  <script>
    // No JavaScript needed - simple navigation page
  </script>
</body>
</html>
